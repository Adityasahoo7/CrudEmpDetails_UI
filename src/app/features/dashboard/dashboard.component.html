<div class="dashboard-wrapper">

  <div class="dashboard-card">

    <!-- Header -->
    <div class="top-bar">
      <h2 class="title">👨‍💼 Employee Management System</h2>

      <button class="logout-btn" (click)="logout()">
        🔓 Logout
      </button>
    </div>

    <!-- Search Section -->
    <div class="search-section">

      <input 
        type="text"
        placeholder="🔍 Search employees..."
        [(ngModel)]="searchText">

      <button class="search-btn" (click)="searchEmployees()">
        Search
      </button>

    </div>


    <!-- Action Buttons -->
    <div class="action-buttons-bar">

      <button class="add-btn" (click)="navigateToAdd()">
        ➕ Add Employee
      </button>

      <button class="predict-btn" (click)="navigateToPredict()">
        🤖 AI Salary Predictor
      </button>

    </div>


    <!-- Employee Table -->
    <div class="table-container">

      <table>

        <thead>
          <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Salary</th>
            <th>Phone</th>
            <th>Email</th>
            <th>Age</th>
            <th>Department</th>
            <th>DOJ</th>
            <th>Actions</th>
          </tr>
        </thead>

        <tbody>

          <tr *ngFor="let emp of employees">

            <td>{{ emp.id }}</td>
            <td>{{ emp.name }}</td>
            <td>₹ {{ emp.salary }}</td>
            <td>{{ emp.phone }}</td>
            <td>{{ emp.email }}</td>
            <td>{{ emp.age }}</td>
            <td>{{ emp.department }}</td>
            <td>{{ emp.joiningDate }}</td>

            <td class="action-buttons">

              <button class="edit"
                      (click)="navigateToEdit(emp.id)">✏</button>

              <button class="view"
                      (click)="navigateToView(emp.id)">👁</button>

              <button class="delete"
                      (click)="deleteEmployee(emp.id)">🗑</button>

            </td>

          </tr>

        </tbody>

      </table>

    </div>

  </div>

</div>
