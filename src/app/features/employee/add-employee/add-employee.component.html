<form (ngSubmit)="save()">

<div class="employee-wrapper">

  <div class="employee-card">

    <h2 class="form-title">➕ Add New Employee</h2>

    <div class="form-grid">

      <div class="form-group">
        <label>Name</label>
        <input type="text" name="name" [(ngModel)]="employee.name">
      </div>

      <div class="form-group">
        <label>Salary</label>
        <input type="number" name="salary" [(ngModel)]="employee.salary">
      </div>

      <div class="form-group">
        <label>Phone</label>
        <input type="text" name="phone" [(ngModel)]="employee.phone">
      </div>

      <div class="form-group">
        <label>Email</label>
        <input type="email" name="email" [(ngModel)]="employee.email">
      </div>

      <div class="form-group">
        <label>Age</label>
        <input type="number" name="age" [(ngModel)]="employee.age">
      </div>

      <div class="form-group">
        <label>Department</label>
        <input type="text" name="department" [(ngModel)]="employee.department">
      </div>

      <div class="form-group">
        <label>Joining Date</label>
        <input type="date" name="joiningDate" [(ngModel)]="employee.joiningDate">
      </div>

    </div>

    <div class="button-section">
      <button type="submit" class="save-btn">💾 Save Employee</button>
    </div>

    <div class="button-section">
      <button type="button" class="back-btn" routerLink="/dashboard">⬅ Back</button>
    </div>

  </div>

</div>

</form>
