<div class="ai-wrapper">

  <div class="ai-card">

    <h2 class="ai-title">🤖 AI Salary Predictor</h2>
    <p class="ai-subtitle">Predict employee salary using Machine Learning</p>

    <div class="form-group">
      <label>Age</label>
      <input type="number" [(ngModel)]="predictData.age" placeholder="Enter age">
    </div>

    <div class="form-group">
      <label>Joining Date</label>
      <input type="date" [(ngModel)]="predictData.joiningDate">
    </div>

    <div class="form-group">
      <label>Department</label>
      <input type="text" [(ngModel)]="predictData.department" placeholder="Enter department">
    </div>

    <button class="predict-btn" (click)="predict()">
      ⚡ Predict Salary
    </button>

    <div class="result-box" *ngIf="predictedSalary">
      <h3>💰 Predicted Salary</h3>
      <p>₹ {{ predictedSalary }}</p>
    </div>

  </div>

</div>
