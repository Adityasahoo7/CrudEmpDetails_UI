<div class="ai-wrapper">

  <div class="ai-card">

    <h2 class="ai-title">🤖 AI Salary Predictor</h2>
    <p class="ai-subtitle">Predict employee salary using Machine Learning</p>

    <!-- Form Section -->
    <div class="form-container">

      <div class="form-group">
        <label>Age</label>
        <input 
          type="number"
          [(ngModel)]="predictData.age"
          placeholder="Enter employee age">
      </div>

      <div class="form-group">
        <label>Joining Date</label>
        <input 
          type="date"
          [(ngModel)]="predictData.joiningDate">
      </div>

      <div class="form-group">
        <label>Department</label>
        <select [(ngModel)]="predictData.department">
          <option value="">Select Department</option>
          <option value="IT">IT</option>
          <option value="HR">HR</option>
          <option value="Finance">Finance</option>
          <option value="Sales">Sales</option>
           <option value="Management">Management</option>
          <option value="Marketing">Marketing</option>
          <option value="RPA">RPA</option>
          <option value="Support">Support</option>
        </select>
      </div>
    </div>

    <!-- Buttons -->
    <div class="button-group">

      <button class="predict-btn" (click)="predict()">
        ⚡ Predict Salary
      </button>

      <button class="back-btn" routerLink="/dashboard">
        ⬅ Back
      </button>

    </div>

    <!-- Result -->
    <div class="result-box" *ngIf="predictedSalary">

      <h3>💰 Predicted Salary</h3>

      <p class="salary-value">
        ₹ {{ predictedSalary | number:'1.0-2' }}
      </p>

    </div>

  </div>

</div>
